<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Kavach - Fake News Detector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>🛡️ Cyber Kavach</h1>
      <p class="tagline">Protecting minds from misinformation</p>
    </header>

    <main>
      <form method="POST" action="/predict">
        <textarea id="newsInput" name="news" maxlength="5000"
                  placeholder="Enter news headline or article text here...">{{ text }}</textarea>
        <p class="char-counter"><span id="charCount">{{ text | length }}</span> / 5,000</p>
        <button type="submit">Analyze</button>
      </form>

      {% if error %}
        <div class="error-box" role="alert">
          <p>⚠️ {{ error }}</p>
        </div>
      {% endif %}

      {% if prediction %}
        <div class="result {% if prediction == 'Fake News' %}fake{% else %}real{% endif %}">
          <h2>Result: {{ prediction }}</h2>
          {% if confidence is not none %}
            <p class="confidence">Confidence: {{ confidence }}%</p>
          {% endif %}
        </div>
      {% endif %}
    </main>

    <footer>
      <p>GuardianX v2 | DarkVibe Coders</p>
    </footer>
  </div>

  <script>
    const input = document.getElementById('newsInput');
    const counter = document.getElementById('charCount');
    input.addEventListener('input', () => {
      counter.textContent = input.value.length;
    });
  </script>
</body>
</html>
