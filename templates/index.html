<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Kavach - Fake News Detector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>🛡️ Cyber Kavach</h1>
      <p class="tagline">Protecting minds from misinformation</p>
    </header>

    <main>
      <form method="POST" action="/predict">
        <textarea name="news" placeholder="Enter news headline here..."></textarea>
        <button type="submit">Analyze</button>
      </form>

      {% if prediction %}
        <div class="result">
          <h2>Result: {{ prediction }}</h2>
        </div>
      {% endif %}
    </main>

    <footer>
      <p>GuardianX v2 | DarkVibe Coders</p>
    </footer>
  </div>
</body>
</html>
